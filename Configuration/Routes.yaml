#
# OAuth 2.1 protocol endpoints (public)
#
-
  name: 'OAuth: Authorization endpoint'
  uriPattern: 'oauth/authorize'
  defaults:
    '@package': 'Medienreaktor.NeosApi'
    '@controller': 'OAuth\Authorize'
    '@action': 'authorize'
    '@format': 'html'
  httpMethods: ['GET']
  # The OAuth parameters arrive as query string and thus become request
  # arguments. When the Neos login resumes this intercepted request after
  # authentication it reverse-routes it WITH those arguments, so the route
  # must accept them as exceeding arguments - otherwise the resolve fails and
  # the login POST falls through to a frontend 404.
  appendExceedingArguments: true

-
  name: 'OAuth: Authorization approval'
  uriPattern: 'oauth/authorize'
  defaults:
    '@package': 'Medienreaktor.NeosApi'
    '@controller': 'OAuth\Authorize'
    '@action': 'approve'
    '@format': 'html'
  httpMethods: ['POST']

-
  name: 'OAuth: Token endpoint'
  uriPattern: 'oauth/token'
  defaults:
    '@package': 'Medienreaktor.NeosApi'
    '@controller': 'OAuth\Token'
    '@action': 'token'
    '@format': 'json'
  httpMethods: ['POST']

-
  name: 'OAuth: Dynamic client registration (RFC 7591)'
  uriPattern: 'oauth/register'
  defaults:
    '@package': 'Medienreaktor.NeosApi'
    '@controller': 'OAuth\Registration'
    '@action': 'register'
    '@format': 'json'
  httpMethods: ['POST']

-
  name: 'OAuth: Authorization server metadata (RFC 8414)'
  uriPattern: '.well-known/oauth-authorization-server'
  defaults:
    '@package': 'Medienreaktor.NeosApi'
    '@controller': 'OAuth\Discovery'
    '@action': 'authorizationServer'
    '@format': 'json'
  httpMethods: ['GET']

-
  name: 'OAuth: Protected resource metadata (RFC 9728)'
  uriPattern: '.well-known/oauth-protected-resource'
  defaults:
    '@package': 'Medienreaktor.NeosApi'
    '@controller': 'OAuth\Discovery'
    '@action': 'protectedResource'
    '@format': 'json'
  httpMethods: ['GET']

