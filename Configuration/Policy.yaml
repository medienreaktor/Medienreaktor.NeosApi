#
# Deny-by-default: the catch-all target below matches EVERY action in the
# Controller\Api namespace. Flow denies any method matched by a privilege
# target unless one matching target is granted to the current roles - so any
# future endpoint added to this package is closed until explicitly granted.
#
# The Controller\OAuth namespace is deliberately NOT matched: token issuance,
# discovery and dynamic client registration are public protocol endpoints.
#
# Node-level and workspace-level authorization is NOT handled here - it is
# enforced structurally by the content repository (visibility constraints on
# every read, ContentRepositoryAuthProvider::canExecuteCommand on every
# command), based on the roles of the authenticated account.
#
privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':

    # The OAuth protocol endpoints are public by design (Neos.Neos ships a
    # global catch-all privilege over ALL controller actions, so public
    # endpoints need an explicit grant to Everybody). The authorize endpoint
    # additionally checks for a logged-in backend account itself.
    'Medienreaktor.NeosApi:OAuth.PublicEndpoints':
      matcher: 'method(Medienreaktor\NeosApi\Controller\OAuth\TokenController->tokenAction()) || method(Medienreaktor\NeosApi\Controller\OAuth\RegistrationController->registerAction()) || method(Medienreaktor\NeosApi\Controller\OAuth\DiscoveryController->.*Action()) || method(Medienreaktor\NeosApi\Controller\OAuth\AuthorizeController->(authorize|approve)Action())'

    'Medienreaktor.NeosApi:Api.CatchAll':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\.*->.*Action())'

    'Medienreaktor.NeosApi:Api.Read':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\(MeController|NodesController|SitesController|NodeTypesController|DimensionsController)->.*Action()) || method(Medienreaktor\NeosApi\Controller\Api\WorkspacesController->(index|show|changes)Action())'

    'Medienreaktor.NeosApi:Api.Write':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\CommandsController->.*Action())'

    'Medienreaktor.NeosApi:Api.Publish':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\WorkspacesController->(publish|discard|rebase|changeBaseWorkspace)Action())'

    'Medienreaktor.NeosApi:Api.Media.Read':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\Media\(AssetsController|AssetSourcesController|CollectionsController|TagsController)->(index|show|usage)Action())'

    'Medienreaktor.NeosApi:Api.Media.Write':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\Media\AssetsController->(create|createVariant|update|delete|replaceResource|import|tag|untag|addToCollection|removeFromCollection)Action()) || method(Medienreaktor\NeosApi\Controller\Api\Media\(CollectionsController|TagsController)->(create|update|delete)Action())'

roles:
  'Neos.Flow:Everybody':
    privileges:
      -
        privilegeTarget: 'Medienreaktor.NeosApi:OAuth.PublicEndpoints'
        permission: GRANT

  'Neos.Neos:AbstractEditor':
    privileges:
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Read'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Write'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Publish'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Media.Read'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Media.Write'
        permission: GRANT

  'Neos.Neos:Administrator':
    privileges:
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.CatchAll'
        permission: GRANT
