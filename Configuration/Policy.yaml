#
# Privileges here are FEATURES, not role assignments: each privilege target
# names one accessible capability of the API (read nodes, write content,
# manage media, publish a workspace, administer users). Roles below are then
# granted the features they should have. A feature can be granted to several
# roles, and a role collects several features - keep the two concerns apart.
#
# Granularity is per resource, split by operation (.Read / .Write / .Publish)
# wherever a resource exposes both, so a resource's writes can be reserved for
# a different role than its reads.
#
# TRADE-OFF: because Flow treats a method matched by NO privilege target as
# open, a NEW controller/action added to Controller\Api is unprotected until it
# is added to one of the matchers below. Keep the matchers in sync with the
# controllers (coverage is checked against Controller\Api\*).
#
# The Controller\OAuth namespace is deliberately NOT matched as a feature:
# token issuance, discovery and dynamic client registration are public
# protocol endpoints, granted to Everybody.
#
# Node-level and workspace-level authorization is NOT handled here - it is
# enforced structurally by the content repository (visibility constraints on
# every read, ContentRepositoryAuthProvider::canExecuteCommand on every
# command), based on the roles of the authenticated account. In particular the
# publish feature grants access to the publish/discard/rebase endpoints to any
# editor; the rule that only Neos.Neos:LivePublisher may publish INTO the
# "live" base workspace is enforced by the content repository, not here.
#
privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':

    # Public OAuth protocol endpoints. Neos.Neos ships a global catch-all
    # privilege over ALL controller actions, so public endpoints need an
    # explicit grant to Everybody. The authorize endpoint additionally checks
    # for a logged-in backend account itself.
    'Medienreaktor.NeosApi:OAuth.PublicEndpoints':
      matcher: 'method(Medienreaktor\NeosApi\Controller\OAuth\TokenController->tokenAction()) || method(Medienreaktor\NeosApi\Controller\OAuth\RegistrationController->registerAction()) || method(Medienreaktor\NeosApi\Controller\OAuth\DiscoveryController->.*Action()) || method(Medienreaktor\NeosApi\Controller\OAuth\AuthorizeController->(authorize|approve)Action())'

    # --- Read features -----------------------------------------------------

    # The authenticated account's own profile and permissions - including the
    # self-service profile writes (own name, email, interface language,
    # password), which are deliberately available to every editor.
    'Medienreaktor.NeosApi:Api.Me':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\MeController->.*Action())'

    # Read the content graph (nodes, their relations, and rendered HTML -
    # the render action is a read of the graph through Fusion).
    'Medienreaktor.NeosApi:Api.Nodes':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\NodesController->.*Action())'

    # Read the node type schema.
    'Medienreaktor.NeosApi:Api.NodeTypes':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\NodeTypesController->.*Action())'

    # Read the configured content dimensions.
    'Medienreaktor.NeosApi:Api.Dimensions':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\DimensionsController->.*Action())'

    # Read the list of sites.
    'Medienreaktor.NeosApi:Api.Sites.Read':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\SitesController->(index|show)Action())'

    # Read the list of users.
    'Medienreaktor.NeosApi:Api.Users.Read':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\UsersController->(index|show)Action())'

    # Invoke the Neos data sources backing select-box style editors. Read-
    # shaped by convention (data sources populate editor options), hence
    # grouped with the read features.
    'Medienreaktor.NeosApi:Api.DataSources':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\DataSourcesController->.*Action())'

    # --- Write features ----------------------------------------------------

    # Write content through the command bus (single + batch).
    'Medienreaktor.NeosApi:Api.Content':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\CommandsController->.*Action())'

    # Create, edit and delete sites. Administrators only.
    'Medienreaktor.NeosApi:Api.Sites.Write':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\SitesController->(create|update|delete)Action())'

    # Create, edit and delete users, plus the assignable-role catalog (a
    # read, but only the admin-only role picker needs it). Administrators
    # only.
    'Medienreaktor.NeosApi:Api.Users.Write':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\UsersController->(create|update|delete|roles)Action())'

    # --- Media features ----------------------------------------------------

    # Browse assets, asset sources, collections and tags.
    'Medienreaktor.NeosApi:Api.Media.Read':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\Media\(AssetsController|AssetSourcesController|CollectionsController|TagsController)->(index|show|usage)Action())'

    # Create, edit and delete assets, collections and tags.
    'Medienreaktor.NeosApi:Api.Media.Write':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\Media\AssetsController->(create|createVariant|update|delete|replaceResource|import|tag|untag|addToCollection|removeFromCollection)Action()) || method(Medienreaktor\NeosApi\Controller\Api\Media\(CollectionsController|TagsController)->(create|update|delete)Action())'

    # --- Workspace features ------------------------------------------------

    # Inspect workspaces and their pending changes.
    'Medienreaktor.NeosApi:Api.Workspaces.Read':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\WorkspacesController->(index|show|changes|documentChanges)Action())'

    # Publish, discard, rebase a workspace and change its base workspace.
    'Medienreaktor.NeosApi:Api.Workspaces.Publish':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\WorkspacesController->(publish|discard|rebase|changeBaseWorkspace)Action())'

    # Collaboration: tail a workspace's change feed and exchange presence
    # heartbeats. Both re-check read access on the workspace themselves.
    'Medienreaktor.NeosApi:Api.Workspaces.Collaboration':
      matcher: 'method(Medienreaktor\NeosApi\Controller\Api\WorkspacesController->(events|presence)Action())'

roles:

  # Public protocol surface.
  'Neos.Flow:Everybody':
    privileges:
      -
        privilegeTarget: 'Medienreaktor.NeosApi:OAuth.PublicEndpoints'
        permission: GRANT

  # Every editor gets the full editing surface: read everything, write content
  # and media, and use the workspace publish endpoints (the live-workspace
  # restriction is enforced by the content repository, see the header note).
  'Neos.Neos:AbstractEditor':
    privileges:
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Me'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Nodes'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.NodeTypes'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Dimensions'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Sites.Read'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Users.Read'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.DataSources'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Content'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Media.Read'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Media.Write'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Workspaces.Read'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Workspaces.Publish'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Workspaces.Collaboration'
        permission: GRANT

  # Administrators additionally get the write side of sites and users (they
  # inherit every editor feature, including the corresponding reads, via
  # Neos.Neos:AbstractEditor).
  'Neos.Neos:Administrator':
    privileges:
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Sites.Write'
        permission: GRANT
      -
        privilegeTarget: 'Medienreaktor.NeosApi:Api.Users.Write'
        permission: GRANT
